name: Release
on:
  push:
    branches:
      - trunk

jobs:
  check_and_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change
        id: version_check
        run: |
          OLD_VERSION=$(git show HEAD^:vip-real-time-collaboration.php | sed -n 's/.*Version: *//p' | tr -d '[:space:]')
          NEW_VERSION=$(git show HEAD:vip-real-time-collaboration.php | sed -n 's/.*Version: *//p' | tr -d '[:space:]')
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $OLD_VERSION to $NEW_VERSION"
          else
            echo "No version change detected"
          fi

      - name: Setup PHP
        if: steps.version_check.outputs.new_version
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Build plugin zip
        if: steps.version_check.outputs.new_version
        run: npm ci && cd websocket-server && npm ci && cd .. && npm run plugin-zip

      - name: Create Release
        if: steps.version_check.outputs.new_version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.new_version }}
          files: vip-real-time-collaboration.zip
          generate_release_notes: true
