name: Release
on:
  push:
    branches:
      - trunk

permissions:
  contents: write

jobs:
  check_and_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Check for version change
        id: version_check
        run: |
          OLD_VERSION=$(git show HEAD^:vip-real-time-collaboration.php 2>/dev/null | sed -n 's/.*Version: *//p' | head -n1 | tr -d '[:space:]')
          NEW_VERSION=$(git show HEAD:vip-real-time-collaboration.php | sed -n 's/.*Version: *//p' | head -n1 | tr -d '[:space:]')
          if [ -z "$OLD_VERSION" ] || [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "No version change detected"
            exit 0
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version changed from $OLD_VERSION to $NEW_VERSION"

      - name: Setup PHP
        if: steps.version_check.outputs.new_version
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.2'

      - name: Setup Node
        if: steps.version_check.outputs.new_version
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Build plugin zip
        if: steps.version_check.outputs.new_version
        run: npm ci && cd websocket-server && npm ci && cd .. && npm run plugin-zip

      - name: Create Release
        if: steps.version_check.outputs.new_version
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version_check.outputs.new_version }}
          files: vip-real-time-collaboration.zip
          generate_release_notes: true
