name: Static analysis
on:
  pull_request:
  push:
    branches:
      - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: eslint, prettier, tsc
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: Automattic/vip-actions/nodejs-setup@trunk
        with:
          node-version-file: .nvmrc
          ignore-scripts: true

      - name: Install websocket-server dependencies
        run: npm install --ignore-scripts --prefix websocket-server

      - name: Check formatting
        run: npm run format:check

      - name: Lint JS/TS && TS types
        run: npm run lint:js

  phpcs:
    name: phpcs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install

      - name: Run phpcs
        run: composer phpcs

  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Run Psalm
        uses: docker://ghcr.io/psalm/psalm-github-actions
        with:
          composer_require_dev: true
          php-version: '8.2'

  dependaban:
    name: Dependaban
    runs-on: ubuntu-latest
    steps:
      - uses: Automattic/vip-actions/dependaban@trunk
