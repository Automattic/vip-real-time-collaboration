name: Test
on:
  pull_request:
  push:
    branches:
      - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: js-unit
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: Automattic/vip-actions/nodejs-setup@trunk
        with:
          node-version-file: .nvmrc
          ignore-scripts: true

      - name: Run JS unit tests
        run: npm run test:js:unit

  test-wss:
    name: js-unit
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: Automattic/vip-actions/nodejs-setup@trunk
        with:
          # A bug in the working-directory handling requires us to hardcode the
          # Node.js version here instead of pointing to the .nvmrc file.
          node-version: 22
          ignore-scripts: true
          working-directory: websocket-server

      - name: Run JS unit tests
        run: npm run test
        working-directory: ./websocket-server
