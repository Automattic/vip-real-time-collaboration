name: Create release PR

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create_release_pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.2'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        id: release
        run: |
          npm run release -- "${{ inputs.release_type }}"

          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v${VERSION}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push release branch
        run: >
          git push --set-upstream origin
          "${{ steps.release.outputs.branch }}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-pr-body.md <<'BODY'
          Prepares v${{ steps.release.outputs.version }} for review.

          Release type: ${{ inputs.release_type }}
          Generated by: Create release PR workflow

          Merging this PR into trunk starts the existing release workflow.
          BODY

          gh pr create \
            --base trunk \
            --head "${{ steps.release.outputs.branch }}" \
            --title "v${{ steps.release.outputs.version }}" \
            --body-file release-pr-body.md
