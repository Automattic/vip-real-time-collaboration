name: Integration Test
on:
  workflow_dispatch:
  # Disabled - remove this comment and uncomment below to re-enable
  # pull_request:
  # push:
  #   branches:
  #     - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-workspace.outputs.cache-hit }}
      dependency-sha: ${{ steps.get-dependency-sha.outputs.sha }}
    steps:
      - name: Get dependency repo SHA
        id: get-dependency-sha
        run: |
          # Use git ls-remote to get the SHA without cloning
          DEPENDENCY_SHA=$(git ls-remote https://github.com/Automattic/gutenberg.git release/vip-rtc-0.1.0 | cut -f1)
          if [ -z "$DEPENDENCY_SHA" ]; then
            echo "❌ Failed to get dependency SHA"
            exit 1
          fi

          echo "sha=$DEPENDENCY_SHA" >> $GITHUB_OUTPUT
          echo "✅ Dependency repo SHA: $DEPENDENCY_SHA"

      - name: Create plugins folder
        run: mkdir -p plugins

      - name: Cache dependency repo
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: plugins/gutenberg
          key: gutenberg-${{ steps.get-dependency-sha.outputs.sha }}
          restore-keys: |
            gutenberg-

      - name: Checkout dependency repo
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: Automattic/gutenberg
          path: plugins/gutenberg
          ref: release/vip-rtc-0.1.0

      - name: Build Gutenberg plugin ZIP file
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: cd plugins/gutenberg && npm run build:plugin-zip
        env:
          NO_CHECKS: 'true'

      - name: Upload dependency repo as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gutenberg
          path: plugins/gutenberg/gutenberg.zip
          retention-days: 1

      - name: Cache hit notification
        if: steps.cache-workspace.outputs.cache-hit == 'true'
        run: |
          echo "✅ Cache hit! Using cached workspace with dependency SHA: ${{ steps.get-dependency-sha.outputs.sha }}"
          echo "⚡ Skipped cloning and building gutenberg"

  integration-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Create plugins folder
        run: mkdir -p plugins

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: plugins/vip-real-time-collaboration

      - name: Download dependency repo
        uses: actions/download-artifact@v4
        with:
          name: gutenberg
          path: plugins/gutenberg

      - name: Setup gutenberg plugin
        working-directory: plugins/gutenberg
        run: unzip -o gutenberg.zip

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: plugins/vip-real-time-collaboration/.nvmrc
          cache: 'npm'
          cache-dependency-path: plugins/vip-real-time-collaboration/package-lock.json

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: plugins/vip-real-time-collaboration

      - name: Copy wp-env config
        run: cp .wp-env.override.gutenberg-dev.json .wp-env.json
        working-directory: plugins/vip-real-time-collaboration

      - name: Call custom start script
        run: npm run dev & npx wait-on http://localhost:8889
        working-directory: plugins/vip-real-time-collaboration

      - name: Run PHP tests
        run: npm run test:integration
        working-directory: plugins/vip-real-time-collaboration

      - name: Stop WordPress environment
        run: |
          npm run dev:stop

  e2e-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Create plugins folder
        run: mkdir -p plugins

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: plugins/vip-real-time-collaboration

      - name: Download dependency repo
        uses: actions/download-artifact@v4
        with:
          name: gutenberg
          path: plugins/gutenberg

      - name: Setup gutenberg plugin
        working-directory: plugins/gutenberg
        run: unzip -o gutenberg.zip

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: plugins/vip-real-time-collaboration/.nvmrc
          cache: 'npm'
          cache-dependency-path: plugins/vip-real-time-collaboration/package-lock.json

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: plugins/vip-real-time-collaboration

      - name: Install Playwright dependencies
        run: npx playwright install --with-deps
        working-directory: plugins/vip-real-time-collaboration

      - name: Copy wp-env config
        run: cp .wp-env.override.gutenberg-dev.json .wp-env.json
        working-directory: plugins/vip-real-time-collaboration

      - name: Call custom start script
        run: npm run dev & npx wait-on http://localhost:8889
        working-directory: plugins/vip-real-time-collaboration

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: plugins/vip-real-time-collaboration

      - name: Stop WordPress environment
        run: |
          npm run dev:stop

      - name: Archive E2E results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: artifacts
